<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget - Dashboard Financiero</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body onload="cargarApp()">

    <div class="main-wrapper">
        <header class="header-glass">
            <div class="budget-main">
                <span class="label">Presupuesto Disponible</span>
                <h1 id="presupuesto">+ 0.00</h1>
            </div>

        <div class="export-actions" style="text-align: center; margin-bottom: 20px;">
             <button onclick="exportarPDF()" class="btn-pro-export">
           <i class="fas fa-file-pdf"></i> Generar Reporte PDF
         </button>
       </div>     

            <div class="summary-cards">
                <div class="card income-card">
                    <div class="card-info">
                        <span class="card-label">Ingresos</span>
                        <h2 id="ingresos">+ 0.00</h2>
                    </div>
                    <div class="card-icon"><i class="fas fa-arrow-up"></i></div>
                </div>

                <div class="card expense-card">
                    <div class="card-info">
                        <span class="card-label">Egresos</span>
                        <div class="expense-value-group">
                            <h2 id="egresos">- 0.00</h2>
                            <span class="badge" id="porcentaje">0%</span>
                        </div>
                    </div>
                    <div class="card-icon"><i class="fas fa-arrow-down"></i></div>
                </div>
            </div>
        </header>

        <section class="input-section">
            <form id="forma" class="glass-form" onsubmit="return false;">
                <div class="input-group">
                    <select id="tipo" class="styled-select">
                        <option value="ingreso" selected>+</option>
                        <option value="egreso">-</option>
                    </select>
                    <input type="text" id="descripcion" placeholder="Descripción (ej. Salario, Renta)" class="styled-input main-input">
                    <input type="number" id="valor" placeholder="Monto" step="any" class="styled-input amount-input">
                    <button class="add-btn" onclick="agregarDato()">
                        <i class="fas fa-plus-circle"></i>
                    </button>
                </div>
            </form>
        </section>

        <main class="content-grid">
            <div class="column">
                <h3 class="column-title income-title"><i class="fas fa-wallet"></i> Ingresos</h3>
                <div id="lista-ingresos" class="list-container">
                    </div>
            </div>

            <div class="column">
                <h3 class="column-title expense-title"><i class="fas fa-receipt"></i> Egresos</h3>
                <div id="lista-egresos" class="list-container">
                    </div>
            </div>
        </main>
    </div>

    <script src="js/Dato.js"></script>
    <script src="js/Ingreso.js"></script>
    <script src="js/Egreso.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
